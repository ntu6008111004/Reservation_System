<style>
  :root {
    color-scheme: light;
    font-family: Inter, Arial, "Noto Sans Thai", sans-serif;
    color: #111827;
    background: #eef3fb;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 34rem),
      linear-gradient(135deg, #f8fbff 0%, #edf3fb 48%, #f7f9fc 100%);
  }

  .shell {
    width: min(1180px, calc(100% - 32px));
    margin: 28px auto;
  }

  .hero {
    display: grid;
    grid-template-columns: 1fr minmax(280px, 360px);
    gap: 20px;
    align-items: stretch;
    margin-bottom: 20px;
    padding: 28px;
    color: #ffffff;
    background: linear-gradient(135deg, #0f2f6f 0%, #155eef 58%, #22a6f2 100%);
    border-radius: 8px;
    box-shadow: 0 24px 60px rgba(21, 94, 239, 0.24);
  }

  .hero h1,
  .panel h2 {
    margin: 0;
    letter-spacing: 0;
  }

  .hero h1 {
    margin-top: 4px;
    font-size: clamp(30px, 4vw, 48px);
    line-height: 1.1;
  }

  .lead {
    max-width: 720px;
    margin: 14px 0 0;
    color: rgba(255, 255, 255, 0.86);
    font-size: 17px;
    line-height: 1.7;
  }

  .eyebrow {
    margin: 0 0 5px;
    color: #2563eb;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hero .eyebrow {
    color: #b9e6ff;
  }

  .hero-status {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 18px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 8px;
    backdrop-filter: blur(10px);
  }

  .hero-status p {
    margin: 4px 0 0;
    color: rgba(255, 255, 255, 0.84);
    line-height: 1.5;
  }

  .status-dot {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    background: #22c55e;
    box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.18);
    flex: 0 0 auto;
  }

  .content-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.3fr) minmax(330px, 0.7fr);
    gap: 20px;
    align-items: start;
  }

  .side-stack {
    display: grid;
    gap: 20px;
  }

  .panel {
    background: rgba(255, 255, 255, 0.94);
    border: 1px solid #dbe5f4;
    border-radius: 8px;
    padding: 22px;
    box-shadow: 0 16px 44px rgba(15, 23, 42, 0.08);
  }

  .panel-heading {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
  }

  .panel h2 {
    font-size: 24px;
    line-height: 1.25;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    padding: 6px 10px;
    color: #155eef;
    background: #e8f0ff;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 800;
    white-space: nowrap;
  }

  .booking-form {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .field {
    display: grid;
    gap: 7px;
  }

  .full {
    grid-column: 1 / -1;
  }

  label {
    color: #25324b;
    font-weight: 800;
  }

  input,
  select,
  textarea {
    width: 100%;
    min-height: 46px;
    border: 1px solid #c8d5e8;
    border-radius: 8px;
    padding: 11px 13px;
    color: #172033;
    background: #ffffff;
    font: inherit;
    outline: none;
    transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
  }

  textarea {
    resize: vertical;
    line-height: 1.6;
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: #155eef;
    box-shadow: 0 0 0 4px rgba(21, 94, 239, 0.12);
  }

  .meeting-toggle {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .meeting-toggle label {
    position: relative;
    display: block;
    min-height: 92px;
    padding: 14px 14px 14px 42px;
    border: 1px solid #c8d5e8;
    border-radius: 8px;
    background: #ffffff;
    cursor: pointer;
  }

  .meeting-toggle input {
    position: absolute;
    top: 16px;
    left: 14px;
    width: 18px;
    min-height: 18px;
    accent-color: #155eef;
  }

  .meeting-toggle strong,
  .meeting-toggle small {
    display: block;
  }

  .meeting-toggle small {
    margin-top: 4px;
    color: #667085;
    font-weight: 600;
    line-height: 1.45;
  }

  .meeting-toggle label:has(input:checked) {
    border-color: #155eef;
    background: #f2f6ff;
    box-shadow: inset 0 0 0 1px #155eef;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }

  button {
    min-height: 44px;
    border: 0;
    border-radius: 8px;
    padding: 10px 18px;
    color: #ffffff;
    background: #155eef;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
  }

  button:hover {
    background: #0f4fd1;
    box-shadow: 0 10px 24px rgba(21, 94, 239, 0.24);
    transform: translateY(-1px);
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.55;
    box-shadow: none;
    transform: none;
  }

  .secondary {
    color: #344054;
    background: #eef2f7;
  }

  .secondary:hover {
    background: #e2e8f0;
    box-shadow: none;
  }

  .icon-button {
    width: 38px;
    min-height: 38px;
    padding: 0;
    border-radius: 8px;
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .metrics div {
    padding: 16px;
    background: #f6f8fc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
  }

  .metrics strong {
    display: block;
    color: #0f2f6f;
    font-size: 30px;
    line-height: 1;
  }

  .metrics span {
    display: block;
    margin-top: 8px;
    color: #667085;
    font-weight: 700;
  }

  .booking-list {
    display: grid;
    gap: 12px;
  }

  .booking-card {
    padding: 14px;
    border: 1px solid #dbe5f4;
    border-radius: 8px;
    background: #ffffff;
  }

  .booking-card header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
  }

  .booking-card h3 {
    margin: 0;
    font-size: 16px;
    line-height: 1.35;
  }

  .booking-card p {
    margin: 8px 0 0;
    color: #667085;
    line-height: 1.5;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    color: #155eef;
    background: #e8f0ff;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }

  .meet-link {
    display: inline-flex;
    margin-top: 10px;
    color: #155eef;
    font-weight: 800;
    text-decoration: none;
  }

  .empty {
    padding: 24px;
    color: #667085;
    text-align: center;
    background: #f8fafc;
    border: 1px dashed #cbd5e1;
    border-radius: 8px;
  }

  .admin-panel summary {
    cursor: pointer;
    font-weight: 900;
  }

  .admin-form {
    display: grid;
    gap: 10px;
    margin-top: 14px;
  }

  pre {
    max-height: 260px;
    overflow: auto;
    margin: 14px 0 0;
    padding: 12px;
    color: #d1e7ff;
    background: #0f172a;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.5;
  }

  .toast {
    position: fixed;
    right: 18px;
    bottom: 18px;
    max-width: min(420px, calc(100% - 36px));
    padding: 14px 16px;
    color: #ffffff;
    background: #0f172a;
    border-radius: 8px;
    box-shadow: 0 20px 50px rgba(15, 23, 42, 0.28);
    font-weight: 800;
    z-index: 10;
  }

  .toast.success {
    background: #027a48;
  }

  .toast.error {
    background: #b42318;
  }

  .error {
    color: #fecaca;
  }

  .success {
    color: #bbf7d0;
  }

  @media (max-width: 900px) {
    .hero,
    .content-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 620px) {
    .shell {
      width: min(100% - 20px, 1180px);
      margin: 10px auto;
    }

    .hero,
    .panel {
      padding: 18px;
    }

    .booking-form,
    .meeting-toggle {
      grid-template-columns: 1fr;
    }

    .form-actions {
      flex-direction: column-reverse;
    }

    button {
      width: 100%;
    }
  }
</style>
