<style>
  :root {
    color-scheme: light;
    font-family: "Kanit", Arial, "Noto Sans Thai", sans-serif;
    color: #111827;
    background: #eef3fb;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 34rem),
      linear-gradient(135deg, #f8fbff 0%, #edf3fb 48%, #f7f9fc 100%);
  }

  .shell {
    width: min(1180px, calc(100% - 32px));
    margin: 28px auto;
  }

  .hero {
    display: grid;
    grid-template-columns: 1fr minmax(280px, 360px);
    gap: 20px;
    align-items: stretch;
    margin-bottom: 20px;
    padding: 28px;
    color: #ffffff;
    background: linear-gradient(135deg, #0f2f6f 0%, #155eef 58%, #22a6f2 100%);
    border-radius: 8px;
    box-shadow: 0 24px 60px rgba(21, 94, 239, 0.24);
  }

  .hero h1,
  .panel h2 {
    margin: 0;
    letter-spacing: 0;
  }

  .hero h1 {
    margin-top: 4px;
    font-size: clamp(30px, 4vw, 48px);
    line-height: 1.1;
  }

  .lead {
    max-width: 720px;
    margin: 14px 0 0;
    color: rgba(255, 255, 255, 0.86);
    font-size: 17px;
    line-height: 1.7;
  }

  .eyebrow {
    margin: 0 0 5px;
    color: #2563eb;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hero .eyebrow {
    color: #b9e6ff;
  }

  .hero-status {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 18px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.22);
    border-radius: 8px;
    backdrop-filter: blur(10px);
  }

  .hero-status p {
    margin: 4px 0 0;
    color: rgba(255, 255, 255, 0.84);
    line-height: 1.5;
  }

  .status-dot {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    background: #22c55e;
    box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.18);
    flex: 0 0 auto;
  }

  .content-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.3fr) minmax(330px, 0.7fr);
    gap: 20px;
    align-items: start;
  }

  .top-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 0 0 20px;
    padding: 8px;
    background: rgba(255, 255, 255, 0.82);
    border: 1px solid #dbe5f4;
    border-radius: 8px;
    box-shadow: 0 14px 36px rgba(15, 23, 42, 0.07);
  }

  .tab-button {
    min-height: 40px;
    color: #344054;
    background: transparent;
    box-shadow: none;
  }

  .tab-button:hover {
    color: #155eef;
    background: #eef4ff;
    box-shadow: none;
    transform: none;
  }

  .tab-button.active {
    color: #ffffff;
    background: #155eef;
  }

  .tab-button.admin-tab {
    margin-left: auto;
    color: #7c2d12;
    background: #fff7ed;
  }

  .tab-button.admin-tab.active {
    color: #ffffff;
    background: #c2410c;
  }

  .tab-view {
    display: none;
  }

  .tab-view.active {
    display: block;
  }

  .side-stack {
    display: grid;
    gap: 20px;
  }

  .admin-layout {
    display: grid;
    gap: 20px;
  }

  .admin-login-card {
    border-color: #fed7aa;
    background: #fffaf5;
  }

  .compact-heading {
    align-items: center;
  }

  .compact-admin-form {
    grid-template-columns: minmax(220px, 1fr) minmax(180px, 0.8fr) auto;
    align-items: end;
  }

  .panel {
    background: rgba(255, 255, 255, 0.94);
    border: 1px solid #dbe5f4;
    border-radius: 8px;
    padding: 22px;
    box-shadow: 0 16px 44px rgba(15, 23, 42, 0.08);
  }

  .panel-heading {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
  }

  .panel h2 {
    font-size: 24px;
    line-height: 1.25;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    padding: 6px 10px;
    color: #155eef;
    background: #e8f0ff;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 800;
    white-space: nowrap;
  }

  .booking-form {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .field {
    display: grid;
    gap: 7px;
  }

  .time-group {
    display: grid;
    gap: 10px;
    padding: 14px;
    background: #f8fbff;
    border: 1px solid #dbe5f4;
    border-radius: 8px;
  }

  .time-group-title {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .time-group-title strong {
    color: #25324b;
  }

  .time-group-title span {
    color: #667085;
    font-size: 13px;
    font-weight: 700;
  }

  .field-hint {
    color: #667085;
    font-size: 13px;
    font-weight: 700;
    line-height: 1.45;
  }

  .conditional-field[hidden] {
    display: none;
  }

  [data-admin-only][hidden],
  .admin-locked[hidden] {
    display: none;
  }

  .admin-locked {
    background: linear-gradient(135deg, #f8fbff, #eef4ff);
  }

  .locked-content {
    max-width: 620px;
    margin: 0 auto;
    text-align: center;
  }

  .locked-content p:last-child {
    margin: 8px 0 0;
    color: #667085;
    line-height: 1.6;
  }

  .time-fields {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 150px;
    gap: 12px;
  }

  .full {
    grid-column: 1 / -1;
  }

  label {
    color: #25324b;
    font-weight: 800;
  }

  label.required::after {
    content: " *";
    color: #d92d20;
    font-weight: 900;
  }

  input,
  select,
  textarea {
    width: 100%;
    min-height: 46px;
    border: 1px solid #c8d5e8;
    border-radius: 8px;
    padding: 11px 13px;
    color: #172033;
    background: #ffffff;
    font: inherit;
    outline: none;
    transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
  }

  input[type="date"],
  input[type="time"] {
    color-scheme: light;
  }

  .date-picker-control {
    position: relative;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
  }

  .native-date-input {
    position: absolute;
    inset: auto auto 0 0;
    width: 1px;
    min-height: 1px;
    height: 1px;
    padding: 0;
    border: 0;
    opacity: 0;
  }

  .date-display {
    cursor: pointer;
  }

  .picker-button {
    min-height: 46px;
    padding: 10px 14px;
    color: #155eef;
    background: #e8f0ff;
    box-shadow: none;
  }

  .picker-button:hover {
    color: #ffffff;
    background: #155eef;
  }

  textarea {
    resize: vertical;
    line-height: 1.6;
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: #155eef;
    box-shadow: 0 0 0 4px rgba(21, 94, 239, 0.12);
  }

  .meeting-toggle {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .meeting-toggle label {
    position: relative;
    display: block;
    min-height: 92px;
    padding: 14px 14px 14px 42px;
    border: 1px solid #c8d5e8;
    border-radius: 8px;
    background: #ffffff;
    cursor: pointer;
  }

  .meeting-toggle input {
    position: absolute;
    top: 16px;
    left: 14px;
    width: 18px;
    min-height: 18px;
    accent-color: #155eef;
  }

  .meeting-toggle strong,
  .meeting-toggle small {
    display: block;
  }

  .meeting-toggle small {
    margin-top: 4px;
    color: #667085;
    font-weight: 600;
    line-height: 1.45;
  }

  .meeting-toggle label:has(input:checked) {
    border-color: #155eef;
    background: #f2f6ff;
    box-shadow: inset 0 0 0 1px #155eef;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }

  button {
    min-height: 44px;
    border: 0;
    border-radius: 8px;
    padding: 10px 18px;
    color: #ffffff;
    background: #155eef;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
  }

  button:hover {
    background: #0f4fd1;
    box-shadow: 0 10px 24px rgba(21, 94, 239, 0.24);
    transform: translateY(-1px);
  }

  button:disabled {
    cursor: not-allowed;
    opacity: 0.55;
    box-shadow: none;
    transform: none;
  }

  .secondary {
    color: #344054;
    background: #eef2f7;
  }

  .secondary:hover {
    background: #e2e8f0;
    box-shadow: none;
  }

  .icon-button {
    width: 38px;
    min-height: 38px;
    padding: 0;
    border-radius: 8px;
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .metrics div {
    padding: 16px;
    background: #f6f8fc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
  }

  .metrics strong {
    display: block;
    color: #0f2f6f;
    font-size: 30px;
    line-height: 1;
  }

  .metrics span {
    display: block;
    margin-top: 8px;
    color: #667085;
    font-weight: 700;
  }

  .admin-metrics {
    grid-template-columns: repeat(5, minmax(0, 1fr));
    margin-bottom: 16px;
  }

  .admin-subnav {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .admin-subnav a,
  .admin-subnav button {
    display: inline-flex;
    align-items: center;
    min-height: 40px;
    padding: 8px 14px;
    color: #155eef;
    background: #e8f0ff;
    border-radius: 999px;
    font-weight: 900;
    text-decoration: none;
    box-shadow: none;
  }

  .admin-resource-grid {
    display: grid;
    gap: 12px;
  }

  .admin-resource-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 16px;
    background: #f8fbff;
    border: 1px solid #dbe5f4;
    border-radius: 18px;
  }

  .admin-resource-card h3,
  .admin-resource-card p {
    margin: 0;
  }

  .admin-resource-card p,
  .admin-resource-card small {
    color: #667085;
    font-weight: 700;
  }

  .danger-button {
    color: #ffffff;
    background: #c2410c;
  }

  .danger-button:hover {
    background: #9a3412;
    box-shadow: 0 10px 24px rgba(194, 65, 12, 0.22);
  }

  .booking-list {
    display: grid;
    gap: 12px;
  }

  .filtered-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 18px;
  }

  .booking-card {
    padding: 14px;
    border: 1px solid #dbe5f4;
    border-radius: 8px;
    background: #ffffff;
  }

  .booking-card header {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-start;
  }

  .booking-card h3 {
    margin: 0;
    font-size: 16px;
    line-height: 1.35;
  }

  .booking-card p {
    margin: 8px 0 0;
    color: #667085;
    line-height: 1.5;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    color: #155eef;
    background: #e8f0ff;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }

  .badge.danger {
    color: #b42318;
    background: #fee4e2;
  }

  .meet-link {
    display: inline-flex;
    margin-top: 10px;
    color: #155eef;
    font-weight: 800;
    text-decoration: none;
  }

  .empty {
    padding: 24px;
    color: #667085;
    text-align: center;
    background: #f8fafc;
    border: 1px dashed #cbd5e1;
    border-radius: 8px;
  }

  .filter-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 16px;
  }

  .calendar-summary {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin: 0 0 16px;
  }

  .calendar-summary div {
    padding: 14px;
    background: #f6f8fc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
  }

  .calendar-summary strong {
    display: block;
    color: #0f2f6f;
    font-size: 26px;
    line-height: 1;
  }

  .calendar-summary span {
    display: block;
    margin-top: 8px;
    color: #667085;
    font-weight: 800;
  }

  .calendar-board {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 18px;
  }

  .day-column {
    min-height: 140px;
    padding: 12px;
    background: #f8fbff;
    border: 1px solid #dbe5f4;
    border-radius: 8px;
  }

  .day-column h3 {
    margin: 0 0 10px;
    color: #0f2f6f;
    font-size: 16px;
  }

  .calendar-event {
    display: grid;
    gap: 3px;
    margin-bottom: 8px;
    padding: 10px;
    background: #ffffff;
    border-left: 4px solid #155eef;
    border-radius: 8px;
    box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
  }

  .calendar-event strong {
    color: #155eef;
    font-size: 13px;
  }

  .calendar-event span {
    color: #172033;
    font-weight: 800;
  }

  .calendar-event small {
    color: #667085;
    font-weight: 700;
  }

  .table-wrap {
    overflow: auto;
    border: 1px solid #dbe5f4;
    border-radius: 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 760px;
    background: #ffffff;
  }

  th,
  td {
    padding: 12px;
    border-bottom: 1px solid #edf2f7;
    text-align: left;
    vertical-align: top;
  }

  th {
    color: #344054;
    background: #f8fafc;
    font-size: 13px;
    font-weight: 900;
  }

  td {
    color: #172033;
    font-size: 14px;
    line-height: 1.45;
  }

  td a {
    color: #155eef;
    font-weight: 800;
  }

  .muted,
  .helper-text {
    color: #667085;
  }

  .helper-text {
    margin: 0 0 14px;
    line-height: 1.6;
  }

  .admin-panel summary {
    cursor: pointer;
    font-weight: 900;
  }

  .admin-form {
    display: grid;
    gap: 10px;
    margin-top: 14px;
  }

  pre {
    max-height: 260px;
    overflow: auto;
    margin: 14px 0 0;
    padding: 12px;
    color: #d1e7ff;
    background: #0f172a;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.5;
  }

  .toast {
    position: fixed;
    right: 18px;
    bottom: 18px;
    max-width: min(420px, calc(100% - 36px));
    padding: 14px 16px;
    color: #ffffff;
    background: #0f172a;
    border-radius: 8px;
    box-shadow: 0 20px 50px rgba(15, 23, 42, 0.28);
    font-weight: 800;
    z-index: 10;
  }

  .toast.success {
    background: #027a48;
  }

  .toast.error {
    background: #b42318;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 18px;
    background: rgba(15, 23, 42, 0.48);
    backdrop-filter: blur(5px);
    z-index: 30;
  }

  .modal-backdrop[hidden] {
    display: none;
  }

  .modal {
    position: relative;
    width: min(460px, 100%);
    padding: 24px;
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 30px 80px rgba(15, 23, 42, 0.3);
  }

  .loading-dialog {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .modal h2 {
    margin: 0;
    color: #111827;
    font-size: 24px;
  }

  .modal p {
    margin: 8px 0 0;
    color: #667085;
    line-height: 1.6;
  }

  .spinner {
    width: 46px;
    height: 46px;
    border: 5px solid #dbeafe;
    border-top-color: #155eef;
    border-radius: 999px;
    animation: spin 800ms linear infinite;
    flex: 0 0 auto;
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    min-height: 36px;
    padding: 0;
    color: #475467;
    background: #eef2f7;
    border-radius: 999px;
    font-size: 22px;
    line-height: 1;
  }

  .modal-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 18px;
  }

  .modal-actions a,
  .modal-actions button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 42px;
    padding: 10px 14px;
    border-radius: 8px;
    font-weight: 800;
    text-decoration: none;
  }

  .modal-actions a {
    color: #ffffff;
    background: #155eef;
  }

  .date-picker-modal {
    width: min(420px, 100%);
  }

  .date-picker-head {
    display: grid;
    grid-template-columns: 44px 1fr 44px;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
  }

  .date-picker-head h2 {
    text-align: center;
    font-size: 22px;
  }

  .date-picker-weekdays,
  .date-picker-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 6px;
  }

  .date-picker-weekdays {
    margin-bottom: 8px;
    color: #667085;
    font-size: 13px;
    font-weight: 900;
    text-align: center;
  }

  .date-picker-day {
    min-height: 42px;
    padding: 0;
    color: #172033;
    background: #f8fbff;
    border: 1px solid #dbe5f4;
    box-shadow: none;
  }

  .date-picker-day:hover {
    color: #ffffff;
    background: #155eef;
    box-shadow: 0 10px 24px rgba(21, 94, 239, 0.18);
  }

  .date-picker-day.outside {
    color: #98a2b3;
    background: #f8fafc;
  }

  .date-picker-day.today {
    border-color: #155eef;
    color: #155eef;
  }

  .date-picker-day.selected {
    color: #ffffff;
    background: #155eef;
    border-color: #155eef;
  }

  .date-picker-actions {
    justify-content: space-between;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .error {
    color: #fecaca;
  }

  .success {
    color: #bbf7d0;
  }

  .hero {
    border-radius: 24px;
  }

  .top-tabs,
  .panel,
  .time-group,
  .meeting-toggle label,
  .metrics div,
  .booking-card,
  .calendar-summary div,
  .day-column,
  .calendar-event,
  .table-wrap,
  .empty,
  .modal,
  .toast {
    border-radius: 18px;
  }

  input,
  select,
  textarea,
  button,
  .modal-actions a,
  .modal-actions button {
    border-radius: 14px;
  }

  .panel {
    box-shadow: 0 18px 46px rgba(15, 23, 42, 0.07);
  }

  .booking-card,
  .metrics div,
  .calendar-summary div,
  .day-column {
    box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
  }

  .tab-button.active,
  button:not(.secondary):not(.picker-button):not(.icon-button) {
    box-shadow: 0 10px 24px rgba(21, 94, 239, 0.18);
  }

  @media (max-width: 900px) {
    .hero,
    .content-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 620px) {
    .shell {
      width: min(100% - 20px, 1180px);
      margin: 10px auto;
    }

    .hero,
    .panel {
      padding: 18px;
    }

    .booking-form,
    .meeting-toggle,
    .time-fields,
    .filter-grid,
    .calendar-summary,
    .admin-metrics,
    .compact-admin-form {
      grid-template-columns: 1fr;
    }

    .tab-button.admin-tab {
      margin-left: 0;
    }

    .form-actions {
      flex-direction: column-reverse;
    }

    button {
      width: 100%;
    }
  }
</style>
