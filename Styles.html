<style>
  :root {
    color-scheme: light;
    font-family: Arial, "Noto Sans Thai", sans-serif;
    color: #172033;
    background: #f5f7fb;
  }
  body {
    margin: 0;
  }
  .app {
    display: grid;
    grid-template-columns: minmax(320px, 480px) 1fr;
    gap: 24px;
    width: min(1180px, calc(100% - 32px));
    margin: 32px auto;
  }
  .panel {
    background: #ffffff;
    border: 1px solid #d9e1ef;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(23, 32, 51, 0.08);
  }
  h1, h2 {
    margin: 0 0 16px;
  }
  form {
    display: grid;
    gap: 12px;
  }
  label {
    display: grid;
    gap: 6px;
    font-weight: 700;
  }
  input, select, textarea, button {
    box-sizing: border-box;
    width: 100%;
    border: 1px solid #c9d4e5;
    border-radius: 6px;
    padding: 10px 12px;
    font: inherit;
  }
  button {
    border: 0;
    background: #155eef;
    color: #ffffff;
    font-weight: 700;
    cursor: pointer;
  }
  .list {
    display: grid;
    gap: 10px;
  }
  .item {
    border: 1px solid #d9e1ef;
    border-radius: 8px;
    padding: 12px;
  }
  .muted {
    color: #667085;
  }
  .error {
    color: #b42318;
  }
  .success {
    color: #027a48;
  }
  @media (max-width: 820px) {
    .app {
      grid-template-columns: 1fr;
      margin: 16px auto;
    }
  }
</style>
