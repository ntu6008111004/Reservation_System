<script>
  const state = {
    rooms: [],
    bookings: [],
    adminSessionToken: '',
    currentTab: 'booking'
  };

  const statusEl = document.getElementById('status');
  const roomSelect = document.getElementById('roomSelect');
  const roomHint = document.getElementById('roomHint');
  const gpsField = document.getElementById('gpsField');
  const bookingsEl = document.getElementById('bookings');
  const form = document.getElementById('bookingForm');
  const submitButton = document.getElementById('submitButton');
  const resetButton = document.getElementById('resetButton');
  const refreshButton = document.getElementById('refreshButton');
  const toastEl = document.getElementById('toast');
  const metricBookings = document.getElementById('metricBookings');
  const metricRooms = document.getElementById('metricRooms');
  const loadingModal = document.getElementById('loadingModal');
  const loadingText = document.getElementById('loadingText');
  const resultModal = document.getElementById('resultModal');
  const resultEyebrow = document.getElementById('resultEyebrow');
  const resultTitle = document.getElementById('resultTitle');
  const resultMessage = document.getElementById('resultMessage');
  const resultActions = document.getElementById('resultActions');
  const resultCloseButton = document.getElementById('resultCloseButton');

  const filterRoom = document.getElementById('filterRoom');
  const filterType = document.getElementById('filterType');
  const filterFromDate = document.getElementById('filterFromDate');
  const filterToDate = document.getElementById('filterToDate');
  const filterSearch = document.getElementById('filterSearch');
  const filteredCount = document.getElementById('filteredCount');
  const onlineCount = document.getElementById('onlineCount');
  const onsiteCount = document.getElementById('onsiteCount');
  const offsiteCount = document.getElementById('offsiteCount');
  const filteredCards = document.getElementById('filteredCards');
  const listRefreshButton = document.getElementById('listRefreshButton');

  const calendarFilterRoom = document.getElementById('calendarFilterRoom');
  const calendarFilterType = document.getElementById('calendarFilterType');
  const calendarFilterFromDate = document.getElementById('calendarFilterFromDate');
  const calendarFilterToDate = document.getElementById('calendarFilterToDate');
  const calendarFilterSearch = document.getElementById('calendarFilterSearch');
  const calendarFilteredCount = document.getElementById('calendarFilteredCount');
  const calendarOnlineCount = document.getElementById('calendarOnlineCount');
  const calendarOnsiteCount = document.getElementById('calendarOnsiteCount');
  const calendarOffsiteCount = document.getElementById('calendarOffsiteCount');
  const calendarBoard = document.getElementById('calendarBoard');
  const bookingTableBody = document.getElementById('bookingTableBody');
  const calendarRefreshButton = document.getElementById('calendarRefreshButton');

  const adminUsername = document.getElementById('adminUsername');
  const adminPassword = document.getElementById('adminPassword');
  const adminLoginButton = document.getElementById('adminLoginButton');
  const adminLogoutButton = document.getElementById('adminLogoutButton');
  const adminDashboardButton = document.getElementById('adminDashboardButton');
  const adminState = document.getElementById('adminState');
  const diagnosticsButton = document.getElementById('diagnosticsButton');
  const diagnosticsResult = document.getElementById('diagnosticsResult');
  const adminTotalBookings = document.getElementById('adminTotalBookings');
  const adminOnlineBookings = document.getElementById('adminOnlineBookings');
  const adminOnsiteBookings = document.getElementById('adminOnsiteBookings');
  const adminOffsiteBookings = document.getElementById('adminOffsiteBookings');
  const adminActiveRooms = document.getElementById('adminActiveRooms');
  const adminRecentBookings = document.getElementById('adminRecentBookings');

  function callApi(action, data) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler((response) => {
          if (response && response.ok) {
            resolve(response.data);
          } else {
            reject(new Error(response && response.error ? response.error.message : 'เกิดข้อผิดพลาดจากระบบ'));
          }
        })
        .withFailureHandler(reject)
        .api(action, data || {});
    });
  }

  function setStatus(message, className) {
    statusEl.textContent = message;
    statusEl.className = className || '';
  }

  function showLoading(message) {
    loadingText.textContent = message || 'กรุณารอสักครู่...';
    loadingModal.hidden = false;
  }

  function hideLoading() {
    loadingModal.hidden = true;
  }

  function showResult(options) {
    resultEyebrow.textContent = options.eyebrow || 'Result';
    resultTitle.textContent = options.title || 'ทำรายการสำเร็จ';
    resultMessage.textContent = options.message || '';
    resultActions.innerHTML = '';

    if (options.meetUrl) {
      const link = document.createElement('a');
      link.href = options.meetUrl;
      link.target = '_blank';
      link.rel = 'noopener';
      link.textContent = 'เปิด Google Meet';
      resultActions.appendChild(link);
    }

    const closeButton = document.createElement('button');
    closeButton.type = 'button';
    closeButton.className = 'secondary';
    closeButton.textContent = 'ปิด';
    closeButton.addEventListener('click', hideResult);
    resultActions.appendChild(closeButton);
    resultModal.hidden = false;
  }

  function hideResult() {
    resultModal.hidden = true;
  }

  function showToast(message, type) {
    toastEl.textContent = message;
    toastEl.className = `toast ${type || ''}`.trim();
    toastEl.hidden = false;
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => {
      toastEl.hidden = true;
    }, 5200);
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function pad2(value) {
    return String(value).padStart(2, '0');
  }

  function formatDateInput(date) {
    return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
  }

  function formatDisplayDate(date) {
    return `${pad2(date.getDate())}/${pad2(date.getMonth() + 1)}/${date.getFullYear()}`;
  }

  function formatTimeInput(date) {
    return `${pad2(date.getHours())}:${pad2(date.getMinutes())}`;
  }

  function parseDateOnly(dateText, label, endOfDay) {
    if (!dateText) return null;
    const dateMatch = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(dateText || '').trim());
    if (!dateMatch) {
      throw new Error(`${label}: กรุณาเลือกวันที่จากปฏิทิน`);
    }
    const year = Number(dateMatch[1]);
    const month = Number(dateMatch[2]);
    const day = Number(dateMatch[3]);
    const parsed = new Date(year, month - 1, day, endOfDay ? 23 : 0, endOfDay ? 59 : 0, endOfDay ? 59 : 0, 0);
    if (parsed.getFullYear() !== year || parsed.getMonth() !== month - 1 || parsed.getDate() !== day) {
      throw new Error(`${label}: วันที่ไม่ถูกต้อง`);
    }
    return parsed;
  }

  function parseThaiDateTime(dateText, timeText, label) {
    const dateMatch = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(dateText || '').trim());
    const timeMatch = /^([01]\d|2[0-3]):([0-5]\d)$/.exec(String(timeText || '').trim());

    if (!dateMatch) throw new Error(`${label}: กรุณาเลือกวันที่จากปฏิทิน`);
    if (!timeMatch) throw new Error(`${label}: กรุณาเลือกเวลาแบบ 24 ชั่วโมง เช่น 09:30 หรือ 14:00`);

    const year = Number(dateMatch[1]);
    const month = Number(dateMatch[2]);
    const day = Number(dateMatch[3]);
    const hour = Number(timeMatch[1]);
    const minute = Number(timeMatch[2]);
    const parsed = new Date(year, month - 1, day, hour, minute, 0, 0);

    if (
      parsed.getFullYear() !== year ||
      parsed.getMonth() !== month - 1 ||
      parsed.getDate() !== day ||
      parsed.getHours() !== hour ||
      parsed.getMinutes() !== minute
    ) {
      throw new Error(`${label}: วันที่หรือเวลาไม่ถูกต้อง`);
    }

    return parsed;
  }

  function formatDateTime(value) {
    if (!value) return '-';
    const date = new Date(value);
    return `${formatDisplayDate(date)} ${formatTimeInput(date)} น.`;
  }

  function formatDayKey(value) {
    return formatDisplayDate(new Date(value));
  }

  function setDefaultTimes() {
    const start = new Date();
    start.setMinutes(start.getMinutes() < 30 ? 30 : 60, 0, 0);
    const end = new Date(start.getTime() + 60 * 60 * 1000);
    form.elements.startDate.value = formatDateInput(start);
    form.elements.startClock.value = formatTimeInput(start);
    form.elements.endDate.value = formatDateInput(end);
    form.elements.endClock.value = formatTimeInput(end);
  }

  function buildBookingPayload() {
    const data = Object.fromEntries(new FormData(form).entries());
    const missing = [];
    if (!data.meetingType) missing.push('รูปแบบประชุม');
    if (!data.roomId) missing.push('ห้องประชุม / ทรัพยากร');
    if (!data.title) missing.push('หัวข้อประชุม');
    if (!data.requesterName) missing.push('ชื่อผู้จอง');
    if (!data.startDate) missing.push('วันที่เริ่ม');
    if (!data.startClock) missing.push('เวลาเริ่ม');
    if (!data.endDate) missing.push('วันที่สิ้นสุด');
    if (!data.endClock) missing.push('เวลาสิ้นสุด');
    if (missing.length) throw new Error(`กรุณากรอกข้อมูลที่บังคับ: ${missing.join(', ')}`);
    if (data.requesterEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.requesterEmail)) {
      throw new Error('อีเมลผู้จองไม่ถูกต้อง ถ้าไม่ต้องการใส่อีเมลให้เว้นว่างไว้');
    }
    if (data.gpsUrl && !/^https?:\/\/.+/i.test(data.gpsUrl)) {
      throw new Error('ลิงก์ GPS ต้องขึ้นต้นด้วย http:// หรือ https://');
    }
    const start = parseThaiDateTime(data.startDate, data.startClock, 'เวลาเริ่ม');
    const end = parseThaiDateTime(data.endDate, data.endClock, 'เวลาสิ้นสุด');
    data.startTime = start.toISOString();
    data.endTime = end.toISOString();
    delete data.startDate;
    delete data.startClock;
    delete data.endDate;
    delete data.endClock;
    if (data.meetingType !== 'OFFSITE') data.gpsUrl = '';
    return data;
  }

  function getSelectedMeetingType() {
    return (new FormData(form).get('meetingType') || 'ONSITE').toUpperCase();
  }

  function getRoomOptionsForMeetingType(meetingType) {
    if (meetingType === 'ONLINE') {
      return state.rooms.filter((room) => String(room.type).toUpperCase() === 'ONLINE');
    }
    if (meetingType === 'OFFSITE') {
      return state.rooms.filter((room) => String(room.type).toUpperCase() === 'OFFSITE');
    }
    return state.rooms.filter((room) => String(room.type).toUpperCase() === 'ONSITE');
  }

  function meetingTypeLabel(type) {
    if (type === 'ONLINE') return 'Online';
    if (type === 'OFFSITE') return 'นอกสถานที่';
    return 'Onsite';
  }

  function renderRooms() {
    const meetingType = getSelectedMeetingType();
    const rooms = getRoomOptionsForMeetingType(meetingType);
    roomSelect.innerHTML = rooms.map((room) => {
      const capacity = room.capacity ? ` · ${room.capacity} ที่นั่ง` : '';
      return `<option value="${escapeHtml(room.id)}">${escapeHtml(room.name)}${capacity}</option>`;
    }).join('') || '<option value="">ไม่มีห้องที่ตรงเงื่อนไข</option>';
    roomSelect.disabled = rooms.length === 0;
    if (meetingType === 'ONLINE') {
      roomHint.textContent = 'ออนไลน์เท่านั้น: แสดงเฉพาะ resource สำหรับสร้าง Google Meet';
    } else if (meetingType === 'OFFSITE') {
      roomHint.textContent = 'นอกสถานที่: แสดงเฉพาะ resource สำหรับบันทึกการประชุมนอกสถานที่';
    } else {
      roomHint.textContent = 'ประชุมในห้อง: แสดงเฉพาะห้องประชุมจริง';
    }
    gpsField.hidden = meetingType !== 'OFFSITE';

    filterRoom.innerHTML = '<option value="">ทุกห้อง</option>' + state.rooms.map((room) => {
      return `<option value="${escapeHtml(room.id)}">${escapeHtml(room.name)}</option>`;
    }).join('');
    calendarFilterRoom.innerHTML = filterRoom.innerHTML;
    metricRooms.textContent = state.rooms.length;
  }

  function bookingCardHtml(item) {
    const typeLabel = meetingTypeLabel(item.meetingType);
    return `
      <article class="booking-card">
        <header>
          <h3>${escapeHtml(item.title)}</h3>
          <span class="badge">${typeLabel}</span>
        </header>
        <p>${escapeHtml(item.roomName)}<br>${formatDateTime(item.startTime)} - ${formatDateTime(item.endTime)}</p>
        <p>ผู้จอง: ${escapeHtml(item.requesterName || item.requesterEmail)}</p>
        ${item.meetUrl ? `<a class="meet-link" href="${escapeHtml(item.meetUrl)}" target="_blank" rel="noopener">เปิด Google Meet</a>` : ''}
        ${item.gpsUrl ? `<a class="meet-link" href="${escapeHtml(item.gpsUrl)}" target="_blank" rel="noopener">เปิด GPS</a>` : ''}
      </article>
    `;
  }

  function renderBookings(items) {
    metricBookings.textContent = items.length;
    bookingsEl.innerHTML = items.length ? items.slice(0, 8).map(bookingCardHtml).join('') : '<div class="empty">ยังไม่มีรายการจองล่าสุด</div>';
  }

  function getFilteredBookings(filters) {
    let fromDate = null;
    let toDate = null;
    if (filters.fromDate.value) fromDate = parseDateOnly(filters.fromDate.value, 'ตั้งแต่วันที่', false);
    if (filters.toDate.value) toDate = parseDateOnly(filters.toDate.value, 'ถึงวันที่', true);

    const query = filters.search.value.trim().toLowerCase();
    return state.bookings.filter((item) => {
      const start = new Date(item.startTime);
      const searchable = [item.title, item.roomName, item.requesterName, item.requesterEmail, item.meetingType].join(' ').toLowerCase();
      if (filters.room.value && item.roomId !== filters.room.value) return false;
      if (filters.type.value && item.meetingType !== filters.type.value) return false;
      if (fromDate && start < fromDate) return false;
      if (toDate && start > toDate) return false;
      if (query && !searchable.includes(query)) return false;
      return true;
    }).sort((a, b) => new Date(a.startTime) - new Date(b.startTime));
  }

  function updateSummary(items, nodes) {
    nodes.total.textContent = items.length;
    nodes.online.textContent = items.filter((item) => item.meetingType === 'ONLINE').length;
    nodes.onsite.textContent = items.filter((item) => item.meetingType === 'ONSITE').length;
    nodes.offsite.textContent = items.filter((item) => item.meetingType === 'OFFSITE').length;
  }

  function renderList() {
    let items = [];
    try {
      items = getFilteredBookings({
        room: filterRoom,
        type: filterType,
        fromDate: filterFromDate,
        toDate: filterToDate,
        search: filterSearch
      });
    } catch (error) {
      showToast(error.message, 'error');
      return;
    }

    updateSummary(items, {
      total: filteredCount,
      online: onlineCount,
      onsite: onsiteCount,
      offsite: offsiteCount
    });

    if (!items.length) {
      filteredCards.innerHTML = '<div class="empty">ไม่พบรายการจองตามเงื่อนไข</div>';
      bookingTableBody.innerHTML = '<tr><td colspan="7">ไม่พบรายการจอง</td></tr>';
      return;
    }

    filteredCards.innerHTML = items.map(bookingCardHtml).join('');
    bookingTableBody.innerHTML = items.map((item) => `
      <tr>
        <td>${formatDateTime(item.startTime)}<br><span class="muted">${formatDateTime(item.endTime)}</span></td>
        <td>${escapeHtml(item.title)}</td>
        <td>${escapeHtml(item.roomName)}</td>
        <td>${escapeHtml(item.requesterName || item.requesterEmail)}</td>
        <td>${meetingTypeLabel(item.meetingType)}</td>
        <td>${item.meetUrl ? `<a href="${escapeHtml(item.meetUrl)}" target="_blank" rel="noopener">เปิด</a>` : '-'}</td>
        <td>${item.gpsUrl ? `<a href="${escapeHtml(item.gpsUrl)}" target="_blank" rel="noopener">เปิด</a>` : '-'}</td>
      </tr>
    `).join('');
  }

  function renderCalendar() {
    let items = [];
    try {
      items = getFilteredBookings({
        room: calendarFilterRoom,
        type: calendarFilterType,
        fromDate: calendarFilterFromDate,
        toDate: calendarFilterToDate,
        search: calendarFilterSearch
      });
    } catch (error) {
      showToast(error.message, 'error');
      return;
    }

    updateSummary(items, {
      total: calendarFilteredCount,
      online: calendarOnlineCount,
      onsite: calendarOnsiteCount,
      offsite: calendarOffsiteCount
    });

    if (!items.length) {
      calendarBoard.innerHTML = '<div class="empty">ไม่พบรายการจองตามเงื่อนไข</div>';
      return;
    }

    const groups = items.reduce((acc, item) => {
      const key = formatDayKey(item.startTime);
      acc[key] = acc[key] || [];
      acc[key].push(item);
      return acc;
    }, {});

    calendarBoard.innerHTML = Object.keys(groups).map((day) => `
      <section class="day-column">
        <h3>${day}</h3>
        ${groups[day].map((item) => `
          <div class="calendar-event">
            <strong>${formatTimeInput(new Date(item.startTime))} - ${formatTimeInput(new Date(item.endTime))}</strong>
            <span>${escapeHtml(item.title)}</span>
            <small>${escapeHtml(item.roomName)} · ${meetingTypeLabel(item.meetingType)}</small>
          </div>
        `).join('')}
      </section>
    `).join('');
  }

  async function refreshBookings() {
    state.bookings = await callApi('listBookings');
    renderBookings(state.bookings);
    renderList();
    renderCalendar();
  }

  function setAdminLoggedIn(session) {
    state.adminSessionToken = session ? session.sessionToken : '';
    adminState.textContent = session ? `เข้าสู่ระบบ: ${session.username}` : 'ยังไม่ได้เข้าสู่ระบบ';
    diagnosticsButton.disabled = !session;
    adminDashboardButton.disabled = !session;
    adminLogoutButton.disabled = !session;
  }

  function switchTab(tabName) {
    state.currentTab = tabName;
    document.querySelectorAll('.tab-button').forEach((button) => {
      button.classList.toggle('active', button.dataset.tab === tabName);
    });
    document.querySelectorAll('.tab-view').forEach((view) => {
      view.classList.toggle('active', view.id === `tab-${tabName}`);
    });
    if (tabName === 'list') renderList();
    if (tabName === 'calendar') renderCalendar();
  }

  async function loadAdminDashboard() {
    showLoading('กำลังโหลด Dashboard ผู้ดูแล...');
    try {
      const dashboard = await callApi('adminDashboard', { sessionToken: state.adminSessionToken });
      adminTotalBookings.textContent = dashboard.totalBookings || 0;
      adminOnlineBookings.textContent = dashboard.onlineBookings || 0;
      adminOnsiteBookings.textContent = dashboard.onsiteBookings || 0;
      adminOffsiteBookings.textContent = dashboard.offsiteBookings || 0;
      adminActiveRooms.textContent = dashboard.activeRooms || 0;
      adminRecentBookings.innerHTML = dashboard.recentBookings && dashboard.recentBookings.length
        ? dashboard.recentBookings.map(bookingCardHtml).join('')
        : '<div class="empty">ยังไม่มีข้อมูล Dashboard</div>';
      showToast('โหลด Dashboard แล้ว', 'success');
    } catch (error) {
      showResult({ eyebrow: 'Admin Dashboard', title: 'โหลด Dashboard ไม่สำเร็จ', message: error.message });
    } finally {
      hideLoading();
    }
  }

  async function load() {
    showLoading('กำลังโหลดข้อมูลระบบ...');
    try {
      setDefaultTimes();
      const bootstrap = await callApi('bootstrap');
      state.rooms = bootstrap.rooms || [];
      renderRooms();
      await refreshBookings();
      setStatus('พร้อมใช้งาน', 'success');
    } catch (error) {
      setStatus(error.message, 'error');
      showResult({ eyebrow: 'Load Error', title: 'โหลดระบบไม่สำเร็จ', message: error.message });
    } finally {
      hideLoading();
    }
  }

  form.addEventListener('submit', async (event) => {
    event.preventDefault();
    let data;
    try {
      data = buildBookingPayload();
    } catch (error) {
      showResult({ eyebrow: 'ตรวจข้อมูล', title: 'กรุณาตรวจวันที่และเวลา', message: error.message });
      return;
    }

    submitButton.disabled = true;
    submitButton.textContent = 'กำลังบันทึก...';
    setStatus('กำลังบันทึกการจอง...', '');
    showLoading(data.meetingType === 'ONLINE' ? 'กำลังจองและสร้าง Google Meet...' : 'กำลังบันทึกการจอง...');

    try {
      const booking = await callApi('createBooking', data);
      form.reset();
      setDefaultTimes();
      await refreshBookings();
      if (booking.meetUrl) {
        setStatus('จองสำเร็จและสร้าง Google Meet แล้ว', 'success');
        showResult({
          eyebrow: 'Booking Confirmed',
          title: 'จองสำเร็จ พร้อม Google Meet',
          message: `ระบบสร้างรายการจอง ${formatDateTime(booking.startTime)} และบันทึก Meet URL ลง Google Sheet แล้ว`,
          meetUrl: booking.meetUrl
        });
      } else {
        setStatus('จองสำเร็จ', 'success');
        showResult({
          eyebrow: 'Booking Confirmed',
          title: 'จองห้องประชุมสำเร็จ',
          message: `ระบบบันทึกรายการจอง ${formatDateTime(booking.startTime)} เรียบร้อยแล้ว`
        });
      }
    } catch (error) {
      setStatus(error.message, 'error');
      showResult({ eyebrow: 'Booking Error', title: 'จองไม่สำเร็จ', message: error.message });
    } finally {
      hideLoading();
      submitButton.disabled = false;
      submitButton.textContent = 'จองห้องประชุม';
    }
  });

  resetButton.addEventListener('click', () => {
    form.reset();
    setDefaultTimes();
  });

  refreshButton.addEventListener('click', async () => {
    refreshButton.disabled = true;
    showLoading('กำลังโหลดรายการล่าสุด...');
    try {
      await refreshBookings();
      showToast('โหลดรายการล่าสุดแล้ว', 'success');
    } catch (error) {
      showResult({ eyebrow: 'Refresh Error', title: 'โหลดรายการไม่สำเร็จ', message: error.message });
    } finally {
      hideLoading();
      refreshButton.disabled = false;
    }
  });

  calendarRefreshButton.addEventListener('click', async () => {
    showLoading('กำลังโหลดปฏิทินการจอง...');
    try {
      await refreshBookings();
      showToast('โหลดปฏิทินแล้ว', 'success');
    } catch (error) {
      showResult({ eyebrow: 'Calendar', title: 'โหลดปฏิทินไม่สำเร็จ', message: error.message });
    } finally {
      hideLoading();
    }
  });

  listRefreshButton.addEventListener('click', async () => {
    showLoading('กำลังโหลดรายการจอง...');
    try {
      await refreshBookings();
      showToast('โหลดรายการจองแล้ว', 'success');
    } catch (error) {
      showResult({ eyebrow: 'Booking List', title: 'โหลดรายการจองไม่สำเร็จ', message: error.message });
    } finally {
      hideLoading();
    }
  });

  adminLoginButton.addEventListener('click', async () => {
    adminLoginButton.disabled = true;
    diagnosticsResult.textContent = '';
    showLoading('กำลังเข้าสู่ระบบผู้ดูแล...');
    try {
      const session = await callApi('adminLogin', {
        username: adminUsername.value,
        password: adminPassword.value
      });
      setAdminLoggedIn(session);
      adminPassword.value = '';
      showToast('เข้าสู่ระบบผู้ดูแลแล้ว', 'success');
      await loadAdminDashboard();
    } catch (error) {
      showResult({ eyebrow: 'Admin Login', title: 'เข้าสู่ระบบไม่สำเร็จ', message: error.message });
    } finally {
      hideLoading();
      adminLoginButton.disabled = false;
    }
  });

  adminLogoutButton.addEventListener('click', () => {
    setAdminLoggedIn(null);
    adminRecentBookings.innerHTML = '<div class="empty">เข้าสู่ระบบเพื่อดู Dashboard</div>';
    diagnosticsResult.textContent = 'ยังไม่ได้รัน diagnostics';
    showToast('ออกจากระบบผู้ดูแลแล้ว', 'success');
  });

  adminDashboardButton.addEventListener('click', loadAdminDashboard);

  diagnosticsButton.addEventListener('click', async () => {
    diagnosticsButton.disabled = true;
    diagnosticsResult.textContent = 'กำลังตรวจระบบ...';
    showLoading('กำลังตรวจระบบ...');
    try {
      const report = await callApi('diagnostics', { sessionToken: state.adminSessionToken });
      diagnosticsResult.textContent = JSON.stringify(report, null, 2);
      showToast(report.ok ? 'Diagnostics ผ่านแล้ว' : 'Diagnostics พบรายการที่ต้องตรวจต่อ', report.ok ? 'success' : 'error');
    } catch (error) {
      diagnosticsResult.textContent = error.message;
      showResult({ eyebrow: 'Diagnostics', title: 'ตรวจระบบไม่สำเร็จ', message: error.message });
    } finally {
      hideLoading();
      diagnosticsButton.disabled = false;
    }
  });

  document.querySelectorAll('.tab-button').forEach((button) => {
    button.addEventListener('click', () => switchTab(button.dataset.tab));
  });

  document.querySelectorAll('input[name="meetingType"]').forEach((input) => {
    input.addEventListener('change', renderRooms);
  });

  [filterRoom, filterType, filterFromDate, filterToDate, filterSearch].forEach((input) => {
    input.addEventListener('input', renderList);
    input.addEventListener('change', renderList);
  });

  [calendarFilterRoom, calendarFilterType, calendarFilterFromDate, calendarFilterToDate, calendarFilterSearch].forEach((input) => {
    input.addEventListener('input', renderCalendar);
    input.addEventListener('change', renderCalendar);
  });

  resultCloseButton.addEventListener('click', hideResult);
  resultModal.addEventListener('click', (event) => {
    if (event.target === resultModal) hideResult();
  });

  adminRecentBookings.innerHTML = '<div class="empty">เข้าสู่ระบบเพื่อดู Dashboard</div>';
  load();
</script>
